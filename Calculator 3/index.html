<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Calculator | Made by Rizwan Wadan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="app">

  <!-- ===== Top Bar ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">◆</span>
      <span class="brand-name">Calculator <span class="brand-credit">Made by Rizwan Wadan</span></span>
    </div>

    <div class="topbar-actions">
      <div class="theme-switcher" role="group" aria-label="Theme switcher">
        <button class="theme-dot" data-theme="light" title="Light theme" aria-label="Light theme"></button>
        <button class="theme-dot" data-theme="dark" title="Dark theme" aria-label="Dark theme"></button>
        <button class="theme-dot" data-theme="midnight" title="Midnight theme" aria-label="Midnight theme"></button>
        <button class="theme-dot" data-theme="neon" title="Neon theme" aria-label="Neon theme"></button>
      </div>

      <button class="icon-btn" id="fullscreenBtn" title="Toggle fullscreen" aria-label="Toggle fullscreen">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm16 0v6h-6v-2h4v-4h2z"/></svg>
      </button>

      <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Open settings">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7zm7.4-3.5c0-.6-.05-1.15-.14-1.7l2-1.55-2-3.46-2.35.95c-.9-.7-1.9-1.25-3-1.6L13.5 2h-4l-.4 2.64c-1.1.35-2.1.9-3 1.6l-2.35-.95-2 3.46 2 1.55c-.1.55-.15 1.1-.15 1.7s.05 1.15.15 1.7l-2 1.55 2 3.46 2.35-.95c.9.7 1.9 1.25 3 1.6L8.5 22h4l.4-2.64c1.1-.35 2.1-.9 3-1.6l2.35.95 2-3.46-2-1.55c.09-.55.14-1.1.14-1.7z"/></svg>
      </button>

      <button class="icon-btn" id="historyToggle" title="Toggle history" aria-label="Toggle history panel">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M13 3a9 9 0 1 0 8.94 10H19.9A7 7 0 1 1 13 5v4l5-4.5L13 0v3z"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== Main Layout ===== -->
  <main class="layout">

    <section class="calc-column">
      <div class="calc-slab" id="calcSlab">

        <!-- Mode switch -->
        <div class="mode-switch" role="tablist" aria-label="Calculator mode">
          <button class="mode-btn active" data-mode="standard" role="tab" aria-selected="true">Standard</button>
          <button class="mode-btn" data-mode="scientific" role="tab" aria-selected="false">Scientific</button>
        </div>

        <!-- Display -->
        <div class="display" id="display">
          <div class="mem-indicator" id="memIndicator" aria-live="off">M</div>
          <div class="expression" id="expression" aria-hidden="true"></div>
          <div class="result-row">
            <span class="result" id="result" aria-live="polite">0</span>
          </div>
          <div class="display-tools">
            <button class="chip" id="copyBtn" title="Copy result" aria-label="Copy result">Copy</button>
            <button class="chip" id="undoBtn" title="Undo" aria-label="Undo">Undo</button>
            <button class="chip" id="redoBtn" title="Redo" aria-label="Redo">Redo</button>
          </div>
        </div>

        <div class="error-banner" id="errorBanner" role="alert"></div>

        <!-- Memory row -->
        <div class="keys memory-row">
          <button class="key key--util" data-action="mc">MC</button>
          <button class="key key--util" data-action="mr">MR</button>
          <button class="key key--util" data-action="ms">MS</button>
          <button class="key key--util" data-action="mplus">M+</button>
          <button class="key key--util" data-action="mminus">M-</button>
        </div>

        <!-- Scientific panel -->
        <div class="scientific-panel" id="scientificPanel">
          <div class="keys sci-grid">
            <button class="key key--sci" data-action="sin">sin</button>
            <button class="key key--sci" data-action="cos">cos</button>
            <button class="key key--sci" data-action="tan">tan</button>
            <button class="key key--sci" data-action="asin">sin⁻¹</button>
            <button class="key key--sci" data-action="acos">cos⁻¹</button>
            <button class="key key--sci" data-action="atan">tan⁻¹</button>

            <button class="key key--sci" data-action="square">x²</button>
            <button class="key key--sci" data-action="cube">x³</button>
            <button class="key key--sci" data-action="pow">xʸ</button>
            <button class="key key--sci" data-action="sqrt">√x</button>
            <button class="key key--sci" data-action="cbrt">∛x</button>
            <button class="key key--sci" data-action="abs">|x|</button>

            <button class="key key--sci" data-action="log">log</button>
            <button class="key key--sci" data-action="ln">ln</button>
            <button class="key key--sci" data-action="exp10">10ˣ</button>
            <button class="key key--sci" data-action="expe">eˣ</button>
            <button class="key key--sci" data-action="fact">x!</button>
            <button class="key key--sci" data-action="mod">mod</button>

            <button class="key key--sci" data-action="pi">π</button>
            <button class="key key--sci" data-action="euler">e</button>
            <button class="key key--sci" data-action="rand">rnd</button>
            <button class="key key--sci" data-action="paren-open">(</button>
            <button class="key key--sci" data-action="paren-close">)</button>
            <button class="key key--sci key--toggle" id="degRadBtn" data-action="degrad">DEG</button>
          </div>
        </div>

        <!-- Standard keys -->
        <div class="keys main-grid">
          <button class="key key--func" data-action="ac">AC</button>
          <button class="key key--func" data-action="ce">CE</button>
          <button class="key key--func" data-action="backspace" aria-label="Backspace">⌫</button>
          <button class="key key--op" data-action="divide">÷</button>

          <button class="key key--num" data-action="7">7</button>
          <button class="key key--num" data-action="8">8</button>
          <button class="key key--num" data-action="9">9</button>
          <button class="key key--op" data-action="multiply">×</button>

          <button class="key key--num" data-action="4">4</button>
          <button class="key key--num" data-action="5">5</button>
          <button class="key key--num" data-action="6">6</button>
          <button class="key key--op" data-action="subtract">−</button>

          <button class="key key--num" data-action="1">1</button>
          <button class="key key--num" data-action="2">2</button>
          <button class="key key--num" data-action="3">3</button>
          <button class="key key--op" data-action="add">+</button>

          <button class="key key--num" data-action="negate">±</button>
          <button class="key key--num" data-action="0">0</button>
          <button class="key key--num" data-action="decimal">.</button>
          <button class="key key--op" data-action="percent">%</button>

          <button class="key key--equals" data-action="equals" id="equalsBtn">=</button>
        </div>
      </div>
    </section>

    <!-- ===== History Sidebar ===== -->
    <aside class="history-panel" id="historyPanel" aria-label="Calculation history">
      <div class="history-header">
        <h2>History</h2>
        <button class="icon-btn" id="closeHistory" aria-label="Close history">✕</button>
      </div>
      <div class="history-search">
        <input type="text" id="historySearch" placeholder="Search history…" aria-label="Search history">
      </div>
      <ul class="history-list" id="historyList"></ul>
      <div class="history-footer">
        <button class="ghost-btn" id="clearHistory">Clear all</button>
      </div>
    </aside>
  </main>
</div>

<!-- ===== Settings Modal ===== -->
<div class="modal-overlay" id="settingsOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal-header">
      <h2 id="settingsTitle">Settings</h2>
      <button class="icon-btn" id="closeSettings" aria-label="Close settings">✕</button>
    </div>

    <div class="modal-body">
      <div class="setting-row">
        <label for="accentPicker">Accent color</label>
        <input type="color" id="accentPicker" value="#c98a3e">
      </div>

      <div class="setting-row">
        <label for="fontSizeSlider">Display size</label>
        <input type="range" id="fontSizeSlider" min="32" max="64" value="48">
      </div>

      <div class="setting-row">
        <label for="soundToggle">Button sound</label>
        <label class="switch">
          <input type="checkbox" id="soundToggle">
          <span class="slider-track"></span>
        </label>
      </div>

      <div class="setting-row">
        <label for="hapticToggle">Press vibration</label>
        <label class="switch">
          <input type="checkbox" id="hapticToggle">
          <span class="slider-track"></span>
        </label>
      </div>

      <button class="ghost-btn full-width" id="resetSettings">Reset to defaults</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
